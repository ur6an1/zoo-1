x-shared-env: &shared-env
  DATABASE_URL: postgresql+asyncpg://zoo:${POSTGRES_PASSWORD:-changeme}@postgres:5432/zoo_bot
  REDIS_URL: redis://redis:6379/0
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zoo_bot
      POSTGRES_USER: zoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoo"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # One-shot: применяет миграции до старта сервисов (вызывается из CD:
  # docker compose run --rm migrate). command переопределяет CMD образа
  # backend (alembic + uvicorn) — здесь нужны только миграции.
  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: "no"
    environment:
      <<: *shared-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *shared-env
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_VISION_MODEL: ${OPENROUTER_VISION_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_TRANSCRIBE_MODEL: ${OPENROUTER_TRANSCRIBE_MODEL:-openai/whisper-1}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-zoo_bot}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      RECEIPT_EMAIL: ${RECEIPT_EMAIL:-}
      PAYMENT_RETURN_URL: ${PAYMENT_RETURN_URL:-}
      FREE_AI_LIMIT: ${FREE_AI_LIMIT:-10}
      FREE_PET_LIMIT: ${FREE_PET_LIMIT:-2}
      AI_MAX_TOKENS_VISION: ${AI_MAX_TOKENS_VISION:-1600}
      AI_MAX_TOKENS_TEXT: ${AI_MAX_TOKENS_TEXT:-1800}
      ADMIN_IDS: ${ADMIN_IDS:-}
      LEGAL_SELLER_NAME: ${LEGAL_SELLER_NAME:-}
      LEGAL_SELLER_INN: ${LEGAL_SELLER_INN:-}
      LEGAL_SUPPORT_CONTACT: ${LEGAL_SUPPORT_CONTACT:-}
      LEGAL_SUPPORT_EMAIL: ${LEGAL_SUPPORT_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *shared-env
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      BACKEND_URL: http://backend:8000
      ADMIN_IDS: ${ADMIN_IDS:-}
      BOT_TIMEZONE: ${BOT_TIMEZONE:-Europe/Moscow}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_VISION_MODEL: ${OPENROUTER_VISION_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_TRANSCRIBE_MODEL: ${OPENROUTER_TRANSCRIBE_MODEL:-openai/whisper-1}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-zoo_bot}
      AI_MAX_TOKENS_VISION: ${AI_MAX_TOKENS_VISION:-1600}
      AI_MAX_TOKENS_TEXT: ${AI_MAX_TOKENS_TEXT:-1800}
      LEGAL_SELLER_NAME: ${LEGAL_SELLER_NAME:-}
      LEGAL_SELLER_INN: ${LEGAL_SELLER_INN:-}
      LEGAL_SUPPORT_CONTACT: ${LEGAL_SUPPORT_CONTACT:-}
      LEGAL_SUPPORT_EMAIL: ${LEGAL_SUPPORT_EMAIL:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *shared-env
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      BOT_TIMEZONE: ${BOT_TIMEZONE:-Europe/Moscow}
      BACKEND_URL: http://backend:8000
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
