name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/ -e backend/ -e bot/ -e worker/
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy shared backend bot worker --ignore-missing-imports
        continue-on-error: true # постепенный type-coverage; не блокируем PR

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zoo_test
          POSTGRES_USER: zoo
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      REDIS_URL: "redis://localhost:6379/0"
      BOT_TOKEN: "123456789:ABCDefGhIJKlmnoPQRstuvWXYZ012345678"
      BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/ -e backend/ -e bot/ -e worker/
          pip install pytest pytest-cov pytest-asyncio httpx aiosqlite

      - name: Run pytest
        run: pytest --cov --cov-report=term-missing --cov-report=html --cov-fail-under=75

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + audit tools
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/ -e backend/ -e bot/ -e worker/
          pip install pip-audit "bandit[toml]"

      - name: pip-audit (зависимости)
        run: pip-audit || true

      - name: Bandit (статический анализ безопасности)
        run: bandit -r shared backend bot worker -ll
